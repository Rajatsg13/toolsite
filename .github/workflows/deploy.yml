name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build static site
        run: npm run build

      - name: Push built files to deploy branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Set identity globally so it applies to any git repo we init
          git config --global user.email "rjtshrma11@gmail.com"
          git config --global user.name "Rajat"

          cd out

          git init
          git remote add origin https://Rajatsg13:${GITHUB_TOKEN}@github.com/Rajatsg13/toolsite.git

          # Fetch existing deploy branch to use as parent (enables fast-forward, no force push)
          git fetch origin deploy --depth=1 2>/dev/null || true

          git add -A

          if git rev-parse --verify FETCH_HEAD 2>/dev/null; then
            PARENT=$(git rev-parse FETCH_HEAD)
            TREE=$(git write-tree)
            COMMIT=$(git commit-tree "$TREE" -p "$PARENT" -m "deploy: $(date +'%Y-%m-%d %H:%M:%S')")
            git push origin "${COMMIT}:refs/heads/deploy"
          else
            git commit -m "deploy: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin HEAD:deploy
          fi
