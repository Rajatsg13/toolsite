name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build static site
        run: npm run build

      - name: Push built files to deploy branch
        run: |
          git config user.email "rjtshrma11@gmail.com"
          git config user.name "Rajat"

          # Fetch existing deploy branch (ignore error if it doesn't exist yet)
          git fetch origin deploy || true

          # Switch to deploy branch, or create it as an orphan
          git checkout deploy 2>/dev/null || git checkout --orphan deploy

          # Remove all tracked files cleanly
          git rm -rf . --quiet 2>/dev/null || true

          # Copy the built static files into the root
          cp -r out/. .

          # Add and commit
          git add -A
          git diff --staged --quiet && echo "No changes to deploy" && exit 0
          git commit -m "deploy: $(date +'%Y-%m-%d %H:%M:%S')"

          # Normal push — Hostinger's git pull will now work correctly
          git push https://Rajatsg13:${{ secrets.GITHUB_TOKEN }}@github.com/Rajatsg13/toolsite.git deploy
