name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build static site
        run: npm run build

      - name: Push built files to deploy branch
        run: |
          cd out
          git init
          git config user.email "rjtshrma11@gmail.com"
          git config user.name "Rajat"
          git add -A
          git commit -m "deploy: built static site $(date +'%Y-%m-%d %H:%M:%S')"
          git push --force https://Rajatsg13:${{ secrets.GITHUB_TOKEN }}@github.com/Rajatsg13/toolsite.git HEAD:deploy
